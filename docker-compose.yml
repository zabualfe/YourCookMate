services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yourcookmate
      POSTGRES_PASSWORD: yourcookmate
      POSTGRES_DB: yourcookmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      - postgres

volumes:
  postgres_data:
