# Render backend — deploy from repo root via Blueprint or connect this repo manually.
# https://render.com/docs/blueprint-spec
#
# After first deploy, set in the Render dashboard (Environment):
#   API_BASE_URL  = https://yourcookmate-api.onrender.com
#   FRONTEND_URL  = your Vercel production URL
#   CORS_ORIGINS  = same as FRONTEND_URL (comma-separate extra origins if needed)
#   DATABASE_URL  = Supabase session pooler URL (port 5432)
#   OPENAI_API_KEY, GOOGLE_*, RESEND_API_KEY, etc. from backend/.env.example

services:
  - type: web
    name: yourcookmate-api
    runtime: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: API_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: "false"
      - key: SMTP_USE_SSL
        value: "false"
      - key: INSTACART_ENABLED
        value: "false"
